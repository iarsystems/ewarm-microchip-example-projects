unsigned int <a href="#" onMouseOver="link('_member','../basic-sdmmc-test-project/GetDelayInTicks3363666690',this); ">GetDelayInTicks</a>(unsigned int startTick, unsigned int endTick)
{
    if (endTick &gt; startTick) return (endTick - startTick);
    return (endTick + (0xFFFFFFFF - startTick));
}
